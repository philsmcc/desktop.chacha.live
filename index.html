<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoverCam Desktop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app-styles.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <img src="assets/logo.png" alt="HoverCam">
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Sign In</button>
                <button class="auth-tab" data-tab="register">Create Account</button>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">
                    <span>Sign In</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
                <div id="login-error" class="login-error"></div>
            </form>
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" placeholder="Choose a username" required minlength="3">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email (optional)</label>
                    <input type="email" id="reg-email" name="email" placeholder="Enter email address">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" placeholder="Choose a password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" name="confirm" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="login-btn register-btn">
                    <span>Create Account</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </button>
                <div id="register-error" class="login-error"></div>
            </form>
            <div class="login-footer">
                <span>HoverCam Desktop v2.0</span>
            </div>
        </div>
        <div class="login-background"></div>
    </div>

    <!-- Desktop Environment -->
    <div id="desktop" class="desktop hidden">
        <!-- Left Taskbar -->
        <div class="taskbar">
            <div class="taskbar-top">
                <div class="taskbar-logo">
                    <img src="assets/logo.png" alt="HoverCam">
                </div>
                <div class="taskbar-apps" id="taskbar-apps">
                    <!-- App icons will be added here -->
                </div>
            </div>
            <div class="taskbar-bottom">
                <button class="taskbar-btn" id="settings-btn" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <button class="taskbar-btn" id="logout-btn" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Desktop Area -->
        <div class="desktop-area" id="desktop-area">
            <!-- Desktop Icons -->
            <div class="desktop-icons" id="desktop-icons">
                <!-- Desktop shortcuts will be added here -->
            </div>
            <!-- Windows Container -->
            <div class="windows-container" id="windows-container">
                <!-- App windows will be rendered here -->
            </div>
        </div>

        <!-- Top Bar -->
        <div class="topbar">
            <div class="topbar-left">
                <span class="topbar-title" id="topbar-title">Desktop</span>
            </div>
            <div class="topbar-right">
                <span class="topbar-date" id="topbar-date"></span>
                <span class="topbar-time" id="topbar-time"></span>
                <div class="topbar-user" id="topbar-user">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span id="current-user">User</span>
                </div>
                <button class="topbar-restore-btn hidden" id="topbar-restore" title="Restore Window">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="7" width="14" height="14" rx="2"/>
                        <path d="M7 7V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
                    </svg>
                </button>
                <button class="topbar-fullscreen-btn" id="topbar-fullscreen" title="Toggle Fullscreen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
